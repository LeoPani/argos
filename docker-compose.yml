# ── Argos full stack ──────────────────────────────────────────────────────────
# Minimal stack (postgres + migrate + api + frontend):
#   $ docker compose up --build
#
# Include BERT classifier (heavy, ~2GB image):
#   $ docker compose --profile ai up --build
#
# Include INPI worker:
#   $ docker compose --profile worker up --build
#
# Everything:
#   $ docker compose --profile ai --profile worker up --build

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: argos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos_dev
      POSTGRES_DB: argos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations ───────────────────────────────────────────────────────────────
  # Runs once and exits — applies pending SQL migrations.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_migrate
    command: ["/app/argos-migrate"]
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Go API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
      AI_BERT_URL: ${AI_BERT_URL:-http://ai:8000}
      API_ADDR: :8080
      LOG_FORMAT: json
      LOG_LEVEL: info
      LENS_API_TOKEN: ${LENS_API_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: argos_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI BERT classifier (opt-in via --profile ai) ────────────────────────
  ai:
    profiles: [ai]
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: argos_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service/argos_model:/app/argos_model:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Go Worker — INPI ingestion (opt-in via --profile worker) ─────────────────
  worker:
    profiles: [worker]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_worker
    command: ["/app/argos-worker"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
      AI_BERT_URL: ${AI_BERT_URL:-http://ai:8000}
      WORKER_CONCURRENCY: 8
      WORKER_INPI_DOWNLOAD_DIR: /tmp/argos/rpi
      LENS_API_TOKEN: ${LENS_API_TOKEN:-}
      LOG_FORMAT: json
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - worker_cache:/tmp/argos

volumes:
  postgres_data:
  worker_cache:
