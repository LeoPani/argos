version: "3.9"

# ── Argos full stack ──────────────────────────────────────────────────────────
# Usage:
#   docker compose up             # start everything
#   docker compose up --build     # rebuild images before start
#   docker compose logs -f api    # tail a specific service

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: argos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos_dev
      POSTGRES_DB: argos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations ───────────────────────────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_migrate
    command: ["/app/argos-migrate"]
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── FastAPI BERT classifier ──────────────────────────────────────────────────
  ai:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: argos_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./argos_model:/app/argos_model:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
      AI_BERT_URL: http://ai:8000
      API_ADDR: :8080
      LOG_FORMAT: json
      LOG_LEVEL: info
      LENS_API_TOKEN: ${LENS_API_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go Worker ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argos_worker
    command: ["/app/argos-worker"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://argos:argos_dev@postgres:5432/argos?sslmode=disable
      AI_BERT_URL: http://ai:8000
      WORKER_CONCURRENCY: 8
      WORKER_INPI_DOWNLOAD_DIR: /tmp/argos/rpi
      LENS_API_TOKEN: ${LENS_API_TOKEN:-}
      LOG_FORMAT: json
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - worker_cache:/tmp/argos

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: argos_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  worker_cache:
