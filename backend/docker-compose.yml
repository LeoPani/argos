services:
  postgres:
    image: postgres:16-alpine
    container_name: argos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos_dev
      POSTGRES_DB: argos
    ports:
      - "5432:5432"
    volumes:
      - argos_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argos -d argos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  argos_pgdata:
    driver: local
